<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netflix</title>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header>
        <h1>Netflix</h1>
    </header>

    <main>
        <section aria-labelledby="perfil-titulo" class="profile-selection">
            <h2 id="perfil-titulo">Quem está assistindo?</h2>
            <ol class="profiles">
                <li class="profile">
                    <a href="netlura-main/catalogo/catalogo.html" class="Perfil">
                        <figure>
                            <img src="assets/Perfil 1.jpg" alt="Um Chapeleiro Maluco cadavérico e melancólico, vestido com veludo roxo e retalhos, equilibra uma xícara de chá e um corvo em um cenário gótico de stop-motion.">
                            <figcaption>Alessandro</figcaption>
                        </figure>
                    </a>
                </li>

                <li class="profile">
                    <a href="netlura-main/catalogo/catalogo.html" class="Perfil">
                        <figure>
                            <img src="assets/Perfil 2.jpg" alt="Uma cachorra Maluca cadavérico e melancólico, equilibra uma xícara de chá e um corvo em um cenário gótico de stop-motion.">
                            <figcaption>Chloe</figcaption>
                        </figure>
                    </a>
                </li>

                <li class="profile">
                    <a href="netlura-main/catalogo/catalogo.html" class="Perfil">
                        <figure>
                            <img src="assets/Perfil 3.jpg" alt="Uma Chapeleira Maluco cadavérico e melancólico, vestido com veludo roxo e retalhos, equilibra uma xícara de chá e um corvo em um cenário gótico de stop-motion.">
                            <figcaption>Karyne</figcaption>
                        </figure>
                    </a>
                </li>
            </ol>
        </section>

        <section class="gerenciar">
            <button type="button" class="botao-gerenciar">Gerenciar perfis</button>
        </section>
    </main>

    <footer>
        <p>© 2026 Netflix</p>
    </footer>
    <button id="theme-toggle" aria-label="Alternar modo escuro/claro">🌙</button>
    <script src="script.js"></script>
    <script src="index.js"></script>

</body>
</html>
